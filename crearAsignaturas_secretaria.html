<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="estilos.css">
    <style>
        /* ============================================================
           CLASES / CREAR ASIGNATURAS – Estilos específicos de página
           ============================================================ */

        /* Badge de Bachillerato (mismo color secundario que el resto) */
        .cas-etiqueta-bach { background: var(--color-secundario); }

        /* Feedback de guardado */
        .cas-feedback {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .cas-feedback[hidden]   { display: none; }
        .cas-feedback--exito    { background: #ecfdf5; color: #059669; border-color: #059669; }
        .cas-feedback--error    { background: #fef2f2; color: #dc2626; border-color: #dc2626; }

        /* ── Dropdown de edición inline ──────────────────────────────── */
        .cas-dropdown-editar {
            background: #f8f9fb;
            border: 1px solid #e0e4ea;
            border-radius: 10px;
            padding: 16px;
            margin: 2px 0 6px;
            animation: cas-slide-in 0.18s ease-out;
        }
        .cas-dropdown-editar[hidden] { display: none; }

        @keyframes cas-slide-in {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .cas-dropdown-editar__titulo {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #1f2937;
            margin-bottom: 12px;
        }

        .cas-dropdown-editar__acciones {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .cas-btn-guardar-dd {
            flex: 1;
            padding: 10px;
            background: #0787f0;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cas-btn-guardar-dd:hover { background: #0670cc; }

        .cas-btn-cancelar-dd {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #0787f0;
            border: 2px solid #0787f0;
            border-radius: 20px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .cas-btn-cancelar-dd:hover { background: #0787f0; color: #fff; }

        /* Curso y grupo en una línea (editar asignatura) */
        .cas-dd-fila-selectores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 14px;
            margin-bottom: 12px;
        }
        .cas-dd-fila-selectores .gu-selector-contenedor { margin-bottom: 0; }
        @media (max-width: 480px) {
            .cas-dd-fila-selectores { grid-template-columns: 1fr; }
        }

        /* ── Divisor dentro del dropdown ────────────────────────────── */
        .cas-dd-divisor {
            border: none;
            border-top: 1px solid #e0e4ea;
            margin: 16px 0;
        }

        .cas-dd-subtitulo {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        /* Cabecera de alumnos: buscador + botón añadir */
        .cas-alumnos-cabecera {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .cas-buscador-alumnos-wrapper {
            position: relative;
            flex: 1;
        }

        .cas-buscador-alumnos-icono {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: #9ca3af;
            pointer-events: none;
        }

        .cas-buscador-alumnos {
            width: 100%;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 10px 8px 32px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.85rem;
            color: #4b5563;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .cas-buscador-alumnos:focus      { border-color: #0787f0; }
        .cas-buscador-alumnos::placeholder { color: #9ca3af; }

        .cas-btn-anadir-alumno {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: #0787f0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .cas-btn-anadir-alumno:hover { background: #0670cc; }
        .cas-btn-anadir-alumno svg   { width: 13px; height: 13px; }

        /* Lista de alumnos dentro del dropdown */
        .cas-alumnos-lista {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 260px;
            overflow-y: auto;
        }

        .cas-alumno-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
        }

        .cas-alumno-item__avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e5e7eb;
            flex-shrink: 0;
        }

        .cas-alumno-item__info { flex: 1; min-width: 0; }

        .cas-alumno-item__nombre {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cas-alumno-item__dni {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 1px;
        }

        .cas-alumno-item__quitar {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 2px;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .cas-alumno-item__quitar:hover { color: #dc2626; }
        .cas-alumno-item__quitar svg   { width: 14px; height: 14px; }

        /* Título (fuera de la tarjeta) */
        .cas-nueva-encabezado {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: #1f2937;
            margin: 0 0 14px;
        }

        /* Tarjeta formulario — misma sombra que mc-tarjeta (home_DOA) */
        .cas-nueva-seccion {
            margin-bottom: 28px;
            background: var(--color-blanco, #fff);
            border: 1px solid #e4e6ea;
            border-radius: var(--radio-tarjeta, 12px);
            padding: 24px 28px;
            box-shadow: var(--sombra-tarjeta);
            transition: box-shadow 0.18s;
        }

        .cas-nueva-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            align-items: end;
            gap: 14px;
        }

        .cas-nueva-form__campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .cas-nueva-form__btn {
            padding: 12px 24px;
            background: #0787f0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            align-self: end;
        }
        .cas-nueva-form__btn:hover { background: #0670cc; }

        /* ── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 720px) {
            .cas-nueva-form {
                grid-template-columns: 1fr 1fr;
            }
            .cas-nueva-form__btn { grid-column: 1 / -1; }
        }

        @media (max-width: 480px) {
            .cas-nueva-form { grid-template-columns: 1fr; }
            .cas-dropdown-editar__acciones { flex-direction: column-reverse; }
        }
    </style>
</head>

            };

            var CURSOS = {
                '1ESO': '1º ESO', '2ESO': '2º ESO', '3ESO': '3º ESO',
                '4ESO': '4º ESO', '1BACH': '1º Bachillerato', '2BACH': '2º Bachillerato'
            };

            var sigId          = ASIGNATURAS.length;
            var idDropdownOpen = null;

            /* ─────────────────────────────────────────────────────────
               Dropdown compartido: edición + alumnos
               ───────────────────────────────────────────────────────── */
            var dropdown = document.createElement('div');
            dropdown.className = 'cas-dropdown-editar';
            dropdown.hidden = true;
            dropdown.innerHTML =
                /* ── Sección: editar asignatura ── */
                '<p class="cas-dropdown-editar__titulo">Editar asignatura</p>' +
                '<label class="gu-etiqueta-campo" for="dd-nombre">NOMBRE</label>' +
                '<input type="text" class="gu-entrada" id="dd-nombre" style="margin-bottom:12px;" autocomplete="off">' +
                '<div class="cas-dd-fila-selectores">' +
                    '<div>' +
                        '<label class="gu-etiqueta-campo" for="dd-curso">CURSO</label>' +
                        '<div class="gu-selector-contenedor">' +
                            '<select class="gu-selector" id="dd-curso">' +
                                '<option value="1ESO">1º ESO</option><option value="2ESO">2º ESO</option>' +
                                '<option value="3ESO">3º ESO</option><option value="4ESO">4º ESO</option>' +
                                '<option value="1BACH">1º Bachillerato</option><option value="2BACH">2º Bachillerato</option>' +
                            '</select>' +
                            '<svg class="gu-select-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                        '</div>' +
                    '</div>' +
                    '<div>' +
                        '<label class="gu-etiqueta-campo" for="dd-grupo">GRUPO</label>' +
                        '<div class="gu-selector-contenedor">' +
                            '<select class="gu-selector" id="dd-grupo">' +
                                '<option value="A">A</option><option value="B">B</option>' +
                                '<option value="C">C</option><option value="D">D</option>' +
                            '</select>' +
                            '<svg class="gu-select-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                /* ── Divisor ── */
                '<hr class="cas-dd-divisor">' +
                /* ── Sección: alumnos ── */
                '<p class="cas-dd-subtitulo">Alumnos en la clase</p>' +
                '<div class="cas-alumnos-cabecera">' +
                    '<div class="cas-buscador-alumnos-wrapper">' +
                        '<svg class="cas-buscador-alumnos-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">' +
                            '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>' +
                        '</svg>' +
                        '<input type="text" class="cas-buscador-alumnos" id="dd-buscador-alumnos" placeholder="Buscar alumno…">' +
                    '</div>' +
                    '<button type="button" class="cas-btn-anadir-alumno" id="dd-btn-anadir">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">' +
                            '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' +
                        '</svg>' +
                        'Añadir' +
                    '</button>' +
                '</div>' +
                '<div class="cas-alumnos-lista" id="dd-alumnos-lista"></div>' +
                /* ── Botones al final ── */
                '<hr class="cas-dd-divisor">' +
                '<div id="dd-feedback" class="cas-feedback" hidden role="alert"></div>' +
                '<div class="cas-dropdown-editar__acciones">' +
                    '<button type="button" class="cas-btn-cancelar-dd" id="dd-cancelar">Cancelar</button>' +
                    '<button type="button" class="cas-btn-guardar-dd"  id="dd-guardar">Guardar cambios</button>' +
                '</div>';

            /* Cancelar */
            dropdown.querySelector('#dd-cancelar').addEventListener('click', cerrarDropdown);

            /* Guardar cambios de la asignatura */
            dropdown.querySelector('#dd-guardar').addEventListener('click', function () {
                var nombre = dropdown.querySelector('#dd-nombre').value.trim();
                var curso  = dropdown.querySelector('#dd-curso').value;
                var grupo  = dropdown.querySelector('#dd-grupo').value;
                if (!nombre || !curso || !grupo) {
                    mostrarFeedbackDD('Rellena todos los campos.', 'error');
                    return;
                }
                var asig = ASIGNATURAS.find(function (a) { return a.id === idDropdownOpen; });
                if (asig) { asig.nombre = nombre; asig.curso = curso; asig.grupo = grupo; }
                mostrarFeedbackDD('Guardado correctamente.', 'exito');
                var idGuardado = idDropdownOpen;
                setTimeout(function () {
                    cerrarDropdown();
                    renderizarLista(document.getElementById('cas-buscador').value);
                    /* Reabre el dropdown en el ítem actualizado para mantener contexto */
                    var elActualizado = document.querySelector('.gu-elemento[data-id="' + idGuardado + '"]');
                    if (elActualizado) toggleDropdown(idGuardado, elActualizado);
                }, 900);
            });

            /* Buscador de alumnos dentro del dropdown */
            dropdown.querySelector('#dd-buscador-alumnos').addEventListener('input', function () {
                if (idDropdownOpen !== null) renderizarAlumnos(idDropdownOpen, this.value);
            });

            /* Añadir alumno */
            dropdown.querySelector('#dd-btn-anadir').addEventListener('click', function () {
                if (idDropdownOpen === null) return;
                var nombre = window.prompt('Nombre del alumno:');
                if (!nombre || !nombre.trim()) return;
                var dni = window.prompt('DNI del alumno:');
                if (!dni || !dni.trim()) return;
                if (!ALUMNOS[idDropdownOpen]) ALUMNOS[idDropdownOpen] = [];
                ALUMNOS[idDropdownOpen].push({ id: 'new-' + Date.now(), nombre: nombre.trim(), dni: dni.trim() });
                renderizarAlumnos(idDropdownOpen, dropdown.querySelector('#dd-buscador-alumnos').value);
            });

            function mostrarFeedbackDD(texto, tipo) {
                var fb = dropdown.querySelector('#dd-feedback');
                fb.textContent = texto;
                fb.className   = 'cas-feedback cas-feedback--' + tipo;
                fb.hidden      = false;
            }

            function cerrarDropdown() {
                dropdown.hidden = true;
                idDropdownOpen  = null;
                var fb = dropdown.querySelector('#dd-feedback');
                fb.hidden    = true;
                fb.className = 'cas-feedback';
                dropdown.querySelector('#dd-buscador-alumnos').value = '';
            }

            /* ─────────────────────────────────────────────────────────
               Renderizar lista de asignaturas
               ───────────────────────────────────────────────────────── */
            function renderizarLista(filtro) {
                var lista = document.getElementById('cas-lista');
                lista.innerHTML = '';

                var f = (filtro || '').toLowerCase();
                var filtradas = ASIGNATURAS.filter(function (a) {
                    return a.nombre.toLowerCase().indexOf(f) !== -1 ||
                           (CURSOS[a.curso] || '').toLowerCase().indexOf(f) !== -1;
                });

                if (filtradas.length === 0) {
                    var msg = document.createElement('p');
                    msg.style.cssText = 'color:#9ca3af;font-size:0.9rem;text-align:center;padding:24px 0;';
                    msg.textContent = 'No se encontraron asignaturas.';
                    lista.appendChild(msg);
                    return;
                }

                filtradas.forEach(function (asig) {
                    var esBach   = asig.curso.indexOf('BACH') !== -1;
                    var badgeCls = esBach ? 'gu-etiqueta cas-etiqueta-bach' : 'gu-etiqueta gu-etiqueta-alumno';

                    var el = document.createElement('div');
                    el.className = 'gu-elemento' + (asig.id === idDropdownOpen ? ' activo' : '');
                    el.setAttribute('data-id', String(asig.id));
                    el.innerHTML =
                        '<div class="gu-elemento-informacion">' +
                            '<div class="gu-elemento-nombre">' + asig.nombre + '</div>' +
                            '<div class="gu-elemento-dni-rol">' +
                                '<span class="gu-elemento-dni">' + (CURSOS[asig.curso] || asig.curso) + '</span>' +
                                '<span class="' + badgeCls + '">Grupo ' + asig.grupo + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<button class="gu-boton-editar" aria-label="Editar ' + asig.nombre + '">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"' +
                            ' stroke-linecap="round" stroke-linejoin="round">' +
                                '<path d="M12 20h9"/>' +
                                '<path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>' +
                            '</svg>' +
                        '</button>';

                    el.querySelector('.gu-boton-editar').addEventListener('click', function (e) {
                        e.stopPropagation();
                        toggleDropdown(asig.id, el);
                    });

                    lista.appendChild(el);

                    /* Si el dropdown estaba abierto aquí, reinsertarlo */
                    if (idDropdownOpen === asig.id) {
                        lista.appendChild(dropdown);
                        dropdown.hidden = false;
                    }
                });
            }

            function toggleDropdown(id, itemEl) {
                if (idDropdownOpen === id) { cerrarDropdown(); return; }
                cerrarDropdown();

                var asig = ASIGNATURAS.find(function (a) { return a.id === id; });
                if (!asig) return;

                dropdown.querySelector('#dd-nombre').value = asig.nombre;
                dropdown.querySelector('#dd-curso').value  = asig.curso;
                dropdown.querySelector('#dd-grupo').value  = asig.grupo;
                idDropdownOpen = id;

                /* Marca el ítem como activo */
                document.querySelectorAll('.gu-elemento').forEach(function (el) {
                    el.classList.toggle('activo', el.getAttribute('data-id') === String(id));
                });

                itemEl.insertAdjacentElement('afterend', dropdown);
                dropdown.hidden = false;
                dropdown.querySelector('#dd-nombre').focus();

                /* Carga la lista de alumnos */
                renderizarAlumnos(id, '');
            }

            /* ─────────────────────────────────────────────────────────
               Renderizar alumnos dentro del dropdown
               ───────────────────────────────────────────────────────── */
            function renderizarAlumnos(asigId, filtro) {
                var lista = dropdown.querySelector('#dd-alumnos-lista');
                lista.innerHTML = '';

                var f = (filtro || '').toLowerCase();
                var filtrados = (ALUMNOS[asigId] || []).filter(function (al) {
                    return al.nombre.toLowerCase().indexOf(f) !== -1 ||
                           al.dni.toLowerCase().indexOf(f) !== -1;
                });

                if (filtrados.length === 0) {
                    var msg = document.createElement('p');
                    msg.style.cssText = 'color:#9ca3af;font-size:0.85rem;text-align:center;padding:16px 0;';
                    msg.textContent = filtro ? 'Sin resultados.' : 'No hay alumnos en esta clase.';
                    lista.appendChild(msg);
                    return;
                }

                filtrados.forEach(function (al) {
                    var item = document.createElement('div');
                    item.className = 'cas-alumno-item';
                    item.innerHTML =
                        '<div class="cas-alumno-item__avatar"></div>' +
                        '<div class="cas-alumno-item__info">' +
                            '<div class="cas-alumno-item__nombre">' + al.nombre + '</div>' +
                            '<div class="cas-alumno-item__dni">'    + al.dni    + '</div>' +
                        '</div>' +
                        '<button class="cas-alumno-item__quitar" aria-label="Quitar ' + al.nombre + '">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                                '<line x1="18" y1="6" x2="6" y2="18"/>' +
                                '<line x1="6" y1="6" x2="18" y2="18"/>' +
                            '</svg>' +
                        '</button>';

                    item.querySelector('.cas-alumno-item__quitar').addEventListener('click', function () {
                        ALUMNOS[asigId] = (ALUMNOS[asigId] || []).filter(function (a) { return a.id !== al.id; });
                        renderizarAlumnos(asigId, dropdown.querySelector('#dd-buscador-alumnos').value);
                    });

                    lista.appendChild(item);
                });
            }

            /* ─────────────────────────────────────────────────────────
               Formulario nueva asignatura (fondo de página)
               ───────────────────────────────────────────────────────── */
            document.getElementById('cas-formulario').addEventListener('submit', function (e) {
                e.preventDefault();
                var nombre = document.getElementById('cas-nombre').value.trim();
                var curso  = document.getElementById('cas-curso').value;
                var grupo  = document.getElementById('cas-grupo').value;

                if (!nombre || !curso || !grupo) {
                    mostrarFeedback('Por favor, rellena todos los campos.', 'error');
                    return;
                }

                var nuevoId = sigId++;
                ASIGNATURAS.push({ id: nuevoId, nombre: nombre, curso: curso, grupo: grupo });
                ALUMNOS[nuevoId] = [];
                document.getElementById('cas-formulario').reset();
                mostrarFeedback('Asignatura "' + nombre + '" añadida correctamente.', 'exito');
                renderizarLista(document.getElementById('cas-buscador').value);
                setTimeout(ocultarFeedback, 2500);
            });

            function mostrarFeedback(texto, tipo) {
                var fb = document.getElementById('cas-feedback');
                fb.textContent = texto;
                fb.className   = 'cas-feedback cas-feedback--' + tipo;
                fb.hidden      = false;
            }

            function ocultarFeedback() {
                var fb = document.getElementById('cas-feedback');
                fb.hidden    = true;
                fb.className = 'cas-feedback';
            }

            /* ── Buscador de asignaturas ─────────────────────────────── */
            document.getElementById('cas-buscador').addEventListener('input', function () {
                renderizarLista(this.value);
            });

            /* ── Hamburguesa ─────────────────────────────────────────── */
            var hamburguesa = document.getElementById('rt-hamburguesa');
            var menuMovil   = document.getElementById('rt-menu-movil');
            if (hamburguesa && menuMovil) {
                hamburguesa.addEventListener('click', function () {
                    var abierto = !menuMovil.hidden;
                    menuMovil.hidden = abierto;
                    hamburguesa.setAttribute('aria-expanded', String(!abierto));
                });
                menuMovil.querySelectorAll('a').forEach(function (a) {
                    a.addEventListener('click', function () {
                        menuMovil.hidden = true;
                        hamburguesa.setAttribute('aria-expanded', 'false');
                    });
                });
            }

            /* ── Perfil emergente ────────────────────────────────────── */
            var perfilBoton     = document.getElementById('rt-perfil-boton');
            var perfilEmergente = document.getElementById('rt-perfil-emergente');
            if (perfilBoton && perfilEmergente) {
                perfilBoton.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var abierto = !perfilEmergente.hidden;
                    perfilEmergente.hidden = abierto;
                    perfilBoton.setAttribute('aria-expanded', String(!abierto));
                });
                document.addEventListener('click', function () {
                    perfilEmergente.hidden = true;
                    perfilBoton.setAttribute('aria-expanded', 'false');
                });
                perfilEmergente.addEventListener('click', function (e) { e.stopPropagation(); });
            }

            /* ── Inicialización ──────────────────────────────────────── */
            renderizarLista('');

        }());
    </script>
