<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DOA – Crear Recursos para la asignatura Matemáticas.">
    <title>Crear Recursos | DOA – Gestión Educativa Inteligente</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos específicos para la vista de Crear Tarea/Examen */
        .ct-cabecera {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .ct-btn-volver {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .ct-btn-volver:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .ct-titulo-pagina {
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f2937;
            margin: 0;
        }

        .ct-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
            align-items: start;
        }

        /* Tarjeta principal (izquierda) */
        .ct-tarjeta {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }

        .ct-campo {
            margin-bottom: 20px;
        }

        .ct-input, .ct-textarea {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            color: #1f2937;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .ct-input:focus, .ct-textarea:focus {
            border-color: #0787f0;
        }

        .ct-textarea {
            resize: vertical;
            min-height: 150px;
        }

        .ct-btn-adjuntar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #0787f0;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .ct-btn-adjuntar:hover { background: #0670cc; }
        .ct-btn-adjuntar:active { transform: scale(0.98); }

        /* Lista de archivos adjuntos */
        .ct-lista-archivos {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ct-archivo-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            color: #374151;
            max-width: 100%;
            box-sizing: border-box;
        }

        .ct-archivo-chip svg {
            color: #6b7280;
            flex-shrink: 0;
        }

        .ct-archivo-chip__nombre {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Panel lateral (derecha) */
        .ct-etiqueta {
            display: block;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #4b5563;
            margin-bottom: 8px;
        }

        .ct-panel-der {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ct-btn-crear {
            width: 100%;
            padding: 12px;
            background: #0787f0;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
            text-align: center;
        }
        .ct-btn-crear:hover { background: #0670cc; }
        .ct-btn-crear:active { transform: scale(0.98); }

        /* Móvil */
        @media (max-width: 900px) {
            .ct-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="script.js" defer></script>
    <script>
        /* Funcionalidad básica de la vista */
        document.addEventListener('DOMContentLoaded', function() {
            var hamburger  = document.getElementById('rt-hamburger');
            var mobileMenu = document.getElementById('rt-mobile-menu');
            if (hamburger && mobileMenu) {
                hamburger.addEventListener('click', function () {
                    var abierto = !mobileMenu.hidden;
                    mobileMenu.hidden = abierto;
                    hamburger.setAttribute('aria-expanded', String(!abierto));
                });
            }

            var perfilBtn = document.getElementById('rt-perfil-btn');
            var perfilPopup = document.getElementById('rt-perfil-popup');
            if (perfilBtn && perfilPopup) {
                perfilBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var abierto = !perfilPopup.hidden;
                    perfilPopup.hidden = abierto;
                    perfilBtn.setAttribute('aria-expanded', String(!abierto));
                });
                document.addEventListener('click', function () {
                    perfilPopup.hidden = true;
                    perfilBtn.setAttribute('aria-expanded', 'false');
                });
                perfilPopup.addEventListener('click', function (e) { e.stopPropagation(); });
            }

            /* Funcionalidad de adjuntar archivos */
            var fileInput = document.getElementById('ct-input-archivos');
            var fileListContainer = document.getElementById('ct-lista-archivos');
            if (fileInput && fileListContainer) {
                fileInput.addEventListener('change', function(e) {
                    fileListContainer.innerHTML = '';
                    var files = e.target.files;
                    for (var i = 0; i < files.length; i++) {
                        var chip = document.createElement('div');
                        chip.className = 'ct-archivo-chip';
                        chip.innerHTML = 
                            '<svg viewBox="0 0 24 24" fill="none" width="16" height="16" aria-hidden="true">' +
                                '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                                '<polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
                            '</svg>' +
                            '<span class="ct-archivo-chip__nombre" title="' + files[i].name + '">' + files[i].name + '</span>';
                        fileListContainer.appendChild(chip);
                    }
                });
            }
        });
    </script>
