    <script src="script.js" defer></script>
    <script>
        /* IIFE: aisla las variables de este módulo del ámbito global */
        (function () {
            /* -- Perfil popup -- */
            var perfilBtn   = document.getElementById('rt-perfil-btn');
            var perfilPopup = document.getElementById('rt-perfil-popup');
            if (perfilBtn && perfilPopup) {
                perfilBtn.addEventListener('click', function (e) {
                    /* Evita que el clic llegue al documento y cierre el popup recién abierto */
                    e.stopPropagation();
                    var abierto = !perfilPopup.hidden;
                    perfilPopup.hidden = abierto;
                    perfilBtn.setAttribute('aria-expanded', String(!abierto));
                });
                /* Clic fuera del popup → cerrarlo */
                document.addEventListener('click', function () {
                    perfilPopup.hidden = true;
                    perfilBtn.setAttribute('aria-expanded', 'false');
                });
                perfilPopup.addEventListener('click', function (e) { e.stopPropagation(); });
            }

            /* -- Hamburguesa -- */
            var hamburger = document.getElementById('ca-hamburger');
            var mobileMenu = document.getElementById('ca-mobile-menu');
            if (hamburger && mobileMenu) {
                hamburger.addEventListener('click', function () {
                    var abierto = !mobileMenu.hidden;
                    mobileMenu.hidden = abierto;
                    hamburger.setAttribute('aria-expanded', String(!abierto));
                });
                var enlaces = mobileMenu.querySelectorAll('a');
                for (var i = 0; i < enlaces.length; i++) {
                    enlaces[i].addEventListener('click', function () {
                        mobileMenu.hidden = true;
                        hamburger.setAttribute('aria-expanded', 'false');
                    });
                }
            }

            /* -- Seleccionar alumno -- */
            var alumnos = document.querySelectorAll('.ca-alumno');
            /* matchMedia permite saber en tiempo real si estamos en móvil */
            var esMobil = window.matchMedia('(max-width: 720px)');
            var textoDemo = '';

            /* Elimina cualquier detalle inline abierto previamente */
            function cerrarTodosInline() {
                var abiertos = document.querySelectorAll('.ca-inline-detalle');
                for (var j = 0; j < abiertos.length; j++) {
                    abiertos[j].remove();
                }
            }

            /* En móvil, inserta el panel de trabajo del alumno justo después del <li> seleccionado
               en lugar de mostrarlo en la columna derecha (que no existe en pantallas pequeñas) */
            function crearInlineDetalle(li) {
                cerrarTodosInline();
                var div = document.createElement('div');
                div.className = 'ca-inline-detalle';
                div.innerHTML =
                    '<button class="ca-inline-detalle__cerrar" aria-label="Cerrar">&times;</button>' +
                    '<textarea class="ca-detalle__textarea" rows="5" placeholder="Respuesta del alumno..." readonly>' + textoDemo + '</textarea>' +
                    '<div class="ca-detalle__archivos ca-archivos-inline">' +
                    crearChipHTML('Documento.pdf') + crearChipHTML('Documento.pdf') +
                    '</div>' +
                    '<div class="ca-calificar ca-calificar--inline">' +
                    '<label class="ca-calificar__label">Calificación</label>' +
                    '<div class="ca-calificar__fila">' +
                    '<input type="number" class="ca-calificar__input ca-nota-inline" min="0" max="10" step="0.1" value="0" placeholder="0">' +
                    '<span class="ca-calificar__sobre">/10</span>' +
                    '</div>' +
                    '<label class="ca-calificar__label ca-calificar__label--comentario">Comentario para el alumno</label>' +
                    '<textarea class="ca-calificar__comentario ca-comentario-inline" placeholder="Escribe un comentario para el alumno..." rows="4"></textarea>' +
                    '<button class="ca-calificar__btn ca-calificar__btn--publicar ca-btn-calificar-inline" type="button">Publicar nota</button>' +
                    '</div>';
                /* Inserta el div a continuación del <li> del alumno seleccionado */
                li.parentNode.insertBefore(div, li.nextSibling);
                div.querySelector('.ca-inline-detalle__cerrar').addEventListener('click', function () {
                    div.remove();
                });
            }

            for (var i = 0; i < alumnos.length; i++) {
                alumnos[i].addEventListener('click', function () {
                    for (var k = 0; k < alumnos.length; k++) {
                        alumnos[k].classList.remove('ca-alumno--activo');
                    }
                    this.classList.add('ca-alumno--activo');
                    /* En móvil no hay columna derecha, se inyecta el detalle en línea */
                    if (esMobil.matches) {
                        crearInlineDetalle(this.closest('li'));
                    }
                });
            }

            /* -- Eliminar chips de archivo -- */
            /* Usa delegación de eventos: un solo listener por contenedor en vez de uno por chip */
            function inicializarEliminaciones(contenedor) {
                contenedor.addEventListener('click', function (e) {
                    var btn = e.target.closest('.ca-archivo-chip__eliminar');
                    if (btn) {
                        btn.closest('.ca-archivo-chip').remove();
                    }
                });
            }

            /* -- Adjuntar archivos -- */
            function inicializarFileInput(contenedor) {
                var inputs = contenedor.querySelectorAll('.ca-input-archivo');
                for (var f = 0; f < inputs.length; f++) {
                    inputs[f].addEventListener('change', function () {
                        /* Soporta tanto el panel escritorio (.ca-detalle__contenido) como el inline */
                        var archivosDiv = this.closest('.ca-detalle__contenido, .ca-inline-detalle')
                            .querySelector('.ca-detalle__archivos, .ca-archivos-inline');
                        if (!archivosDiv) return;
                        for (var a = 0; a < this.files.length; a++) {
                            agregarChip(archivosDiv, this.files[a].name);
                        }
                        /* Limpia el input para permitir seleccionar el mismo archivo de nuevo */
                        this.value = '';
                    });
                }
            }

            function crearChipHTML(nombre) {
                return '<div class="ca-archivo-chip" data-nombre="' + nombre + '">' +
                    '<svg class="ca-archivo__icono" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                    '<span class="ca-archivo-chip__nombre">' + nombre + '</span>' +
                    '</div>';
            }

            /* Usa un div temporal para convertir el HTML del chip en un nodo DOM real */
            function agregarChip(contenedor, nombre) {
                var temp = document.createElement('div');
                temp.innerHTML = crearChipHTML(nombre);
                contenedor.appendChild(temp.firstChild);
            }

            /* -- Inicializar panel escritorio -- */
            var panelDesktop = document.getElementById('ca-detalle-contenido');
            if (panelDesktop) {
                inicializarEliminaciones(panelDesktop);
                inicializarFileInput(panelDesktop);
            }

            /* -- Publicar nota: desktop -- */
            var btnCalificar = document.getElementById('ca-btn-calificar');
            var notaInput = document.getElementById('ca-nota-input');
            if (btnCalificar && notaInput) {
                btnCalificar.addEventListener('click', function () {
                    var comentario = document.getElementById('ca-comentario-input');
                    aplicarNota(notaInput.value, comentario ? comentario.value : '');
                });
            }

            /* -- Publicar nota: inline (delegado) -- */
            document.addEventListener('click', function (e) {
                var btn = e.target.closest('.ca-btn-calificar-inline');
                if (!btn) return;
                var calificar = btn.closest('.ca-calificar');
                var input = calificar.querySelector('.ca-nota-inline');
                var comentario = calificar.querySelector('.ca-comentario-inline');
                if (input) aplicarNota(input.value, comentario ? comentario.value : '');
            });

            function aplicarNota(valor, comentario) {
                var nota = parseFloat(valor);
                if (isNaN(nota) || nota < 0 || nota > 10) {
                    alert('Introduce una nota válida entre 0 y 10.');
                    return;
                }
                var activo = document.querySelector('.ca-alumno--activo');
                if (!activo) return;
                var badge = activo.querySelector('.ca-alumno__nota');
                if (badge) {
                    badge.textContent = nota.toFixed(1).replace('.', ',') + '/10';
                }
            }
        }());
    </script>
